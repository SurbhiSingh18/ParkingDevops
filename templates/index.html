<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Smart Parking</title>

    <style>
        body {
           margin: 0;
           font-family: 'Segoe UI';
           background: linear-gradient(135deg, #20a7c5, #ea2b54);
           min-height: 100vh;
           overflow: hidden;
           display: flex;
           flex-direction: column;
           align-items: center;          /* removes extra scroll color */
        }

        /* Navbar */
        .navbar {
            position: relative;   /* ⭐ IMPORTANT FIX */
            color: white;
            padding: 15px;
            text-align: center;
            font-size: 22px;
            font-weight: bold;
        }

        /* Layout */
        .container {
            display: flex;
            justify-content: center;
            align-items: center;   /* NEW */
            flex: 1;
        }

        /* Card */
        .card {
            background: white;
            padding: 20px;
            border-radius: 15px;
            width: 500px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        .card:hover {
            transform: translateY(-8px) scale(1.02);
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }

        /* Inputs */
        input, select {
            width: 100%;
            height: 38px;
            padding: 10px;
            margin: 5px 0 10px;
            border-radius: 8px;
            border: 1px solid #ccc;
            box-sizing: border-box;
            font-size: 14px;
        }

        input:focus, select:focus {
            border-color: #667eea;
            outline: none;
            box-shadow: 0 0 8px rgba(102,126,234,0.5);
        }

        /* Button */
        button {
            grid-column: span 2;   /* take full row */
            width: 45%;
            padding: 14px 0;
            margin: 15px auto 0;   /* center horizontally */
            display: block;

            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            border-radius: 12px;

            font-size: 15px;
            font-weight: 600;

            cursor: pointer;
            transition: all 0.3s ease;
        }

        button:hover {
            background: #4fe452;
            transform: scale(1.05);
            box-shadow: 0 0 15px rgba(102,126,234,0.6);
        }

        /* Booked list */
        .booked-list p {
            background: #f1f3ff;
            padding: 8px;
            border-radius: 6px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .cancel-btn {
            background: red;
            padding: 4px 8px;
            border-radius: 5px;
            color: white;
            text-decoration: none;
            font-size: 12px;
        }

        /* Toast */
        .toast {
            position: fixed;
            top: 20px;
            right: 20px;
            background: #333;
            color: white;
            padding: 12px 20px;
            border-radius: 8px;
            opacity: 0;
            transition: 0.5s;
            z-index: 2000;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        .toast.show {
            opacity: 1;
        }

        .view-btn {
    position: fixed;
    top: 15px;
    background: white;
    color: #333;
    padding: 8px 14px;
    border-radius: 8px;
    text-decoration: none;
    font-size: 14px;
    font-weight: 500;
    transition: 0.3s;
    z-index: 1000;
}

.view-btn:first-child {
    right: 140px;
}

.view-btn:last-child {
    right: 20px;
}

.view-btn:hover {
    background: #eee;
    transform: scale(1.05);
}

        /* Bubbles animation */
        .bubbles {
            position: fixed;
            width: 100%;
            height: 100%;
            overflow: hidden;
            z-index: -1;
        }

        .bubbles span {
            position: absolute;
            width: 100px;
            height: 100px;
            background: rgba(255,255,255,0.4);
            bottom: -100px;
            border-radius: 50%;
            animation: rise 12s infinite ease-in;
        }

        .bubbles span:nth-child(1){left:10%;animation-delay:0s;}
        .bubbles span:nth-child(2){left:20%;animation-delay:2s;}
        .bubbles span:nth-child(3){left:30%;animation-delay:4s;}
        .bubbles span:nth-child(4){left:40%;animation-delay:1s;}
        .bubbles span:nth-child(5){left:50%;animation-delay:3s;}
        .bubbles span:nth-child(6){left:60%;animation-delay:5s;}
        .bubbles span:nth-child(7){left:70%;animation-delay:2s;}
        .bubbles span:nth-child(8){left:80%;animation-delay:6s;}
        .bubbles span:nth-child(9){left:90%;animation-delay:4s;}
        .bubbles span:nth-child(10){left:25%;animation-delay:7s;}

        @keyframes rise {
            0% {transform: translateY(0); opacity:0.5;}
            100% {transform: translateY(-800px); opacity:0;}
        }

        form {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 8px;
        }

        .full {
        grid-column: span 2;
        }
 
    </style>
</head>

<body>

<!-- Animated Background -->
<div class="bubbles">
    <span></span><span></span><span></span><span></span><span></span>
    <span></span><span></span><span></span><span></span><span></span>
</div>

<div class="navbar">
    Smart Slot Parking Booking System 
    
    <a href="/bookings" class="view-btn">View Bookings</a>
</div>

<div class="container">
<div class="card">

<form action="/book" method="post">

    <label>Name:</label>
    <input type="text" name="name" required>

    <label>College ID:</label>
    <input type="text" name="college_id" required>

    <label>Password:</label>
    <input type="password" name="password" required>

    <label>Vehicle:</label>
    <select name="vehicle" required>
        <option value="" disabled selected>Select Vehicle</option>
        <option value="Car">Car</option>
        <option value="Scooter">Scotter</option>
        <option value="Bike">Bike</option>
    </select>

    <label>Date:</label>
    <input type="date" name="date" 
       value="{{ selected_date }}"
       min="{{ min_date }}" 
       max="{{ max_date }}" 
       required onchange="refreshBookings()">

    <label>Start Time:</label>
    <input type="time" name="start_time" required>

    <label>End Time:</label>
    <input type="time" name="end_time" required>

    <label>Select Slot:</label>
    <select name="slot" id="slotSelect" required onchange="checkSlotStatus()">
        <option value="" disabled selected>Select Slot</option>
        {% for slot in slots %}
            {% if slot in booked_slots %}
                <option value="{{ slot }}" disabled>{{ slot }} (Booked)</option>
            {% else %}
                <option value="{{ slot }}">{{ slot }}</option>
            {% endif %}
        {% endfor %}
    </select>
    <div id="slotStatus" style="margin-top: 5px; font-size: 12px; color: #666;"></div>

    <button type="submit">Book Slot</button>

</form>


</div>
</div>

<div id="toast" class="toast"></div>

<script>
    const params = new URLSearchParams(window.location.search);
    const msg = params.get("msg");

    if (msg === "success") {
        showAlert("Booking Successful!");
    }
    else if (msg === "already") {
        showAlert("Slot already booked!");
    }
    else if (msg === "cancelled") {
        showAlert("Booking Cancelled!");
    }

    // Custom centered alert function
    function showAlert(message) {
        // Create modal overlay
        const modalOverlay = document.createElement('div');
        modalOverlay.style.cssText = `
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 3000;
            display: flex;
            align-items: center;
            justify-content: center;
        `;
        
        // Create message box
        const messageBox = document.createElement('div');
        messageBox.style.cssText = `
            background: white;
            padding: 20px 30px;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            text-align: center;
            max-width: 400px;
            margin: 20px;
        `;
        messageBox.innerHTML = `
            <p style="margin: 0 0 15px 0; color: #333; font-size: 16px;">${message}</p>
            <button onclick="this.parentElement.parentElement.remove()" style="
                background: #667eea;
                color: white;
                border: none;
                padding: 10px 20px;
                border-radius: 5px;
                cursor: pointer;
                font-size: 14px;
            ">OK</button>
        `;
        
        modalOverlay.appendChild(messageBox);
        document.body.appendChild(modalOverlay);
        
        // Auto-remove after 3 seconds
        setTimeout(() => {
            if (modalOverlay.parentElement) {
                modalOverlay.remove();
            }
        }, 3000);
    }

    // Function to check slot status
    function checkSlotStatus() {
        const slotSelect = document.getElementById("slotSelect");
        const slotStatus = document.getElementById("slotStatus");
        const selectedSlot = slotSelect.value;
        
        if (selectedSlot === "") {
            slotStatus.textContent = "";
            return;
        }
        
        // Check if slot is disabled (already booked)
        const selectedOption = slotSelect.options[slotSelect.selectedIndex];
        
        if (selectedOption.disabled) {
            slotStatus.textContent = "❌ This slot is already booked!";
            slotStatus.style.color = "#ff4444";
        } else {
            slotStatus.textContent = "✅ This slot is available";
            slotStatus.style.color = "#4CAF50";
        }
    }

    // Function to refresh page when date changes
    function refreshBookings() {
        const dateInput = document.querySelector('input[name="date"]');
        const selectedDate = dateInput.value;
        window.location.href = '/?date=' + selectedDate;
    }

</script>

</body>
</html>
